name: Release

on:
  push:
    tags:
      - "v*"

# Publishes to npm via Trusted Publishing (OIDC) — no secret needed.
# Configured on npmjs.com: package mcp-keycloak-admin → Settings → Trusted
# publishing → GitHub Actions, repo mrz1880/mcp-keycloak-admin, workflow
# release.yml. Requires npm >= 11.5.1 (bundled with Node 24) and provenance is
# generated automatically.
permissions:
  id-token: write
  # write is needed for the final step to create the GitHub Release.
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      # Trusted publishing (OIDC) needs npm >= 11.5.1; the runner's bundled npm
      # is older, so upgrade before publishing.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run check
      # setup-node writes a placeholder _authToken into the userconfig .npmrc.
      # npm would try to publish with that dummy token and fail; remove it so
      # npm performs the OIDC trusted-publishing exchange instead.
      - run: npm config delete '//registry.npmjs.org/:_authToken' --location user
      - run: npm publish --provenance --access public
      # Publish a GitHub Release for this tag, using the matching CHANGELOG
      # section as the notes. Runs only after a successful npm publish.
      - name: Create GitHub Release from CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md | sed '/./,$!d' > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release $TAG" > release-notes.md
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file release-notes.md --verify-tag
          fi
