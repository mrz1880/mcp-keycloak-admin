name: Release

on:
  push:
    tags:
      - "v*"

# Publishes to npm via Trusted Publishing (OIDC) — no NPM_TOKEN secret needed.
# Configure the trusted publisher for this package on npmjs.com:
#   package: mcp-keycloak-admin
#   provider: GitHub Actions
#   repository: mrz1880/mcp-keycloak-admin
#   workflow: release.yml
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # Trusted Publishing (OIDC) requires a recent npm.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run check
      - run: npm publish --provenance --access public
