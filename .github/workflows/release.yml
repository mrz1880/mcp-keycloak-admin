name: Release

on:
  push:
    tags:
      - "v*"

# Publishes to npm via Trusted Publishing (OIDC) — no secret needed.
# Configured on npmjs.com: package mcp-keycloak-admin → Settings → Trusted
# publishing → GitHub Actions, repo mrz1880/mcp-keycloak-admin, workflow
# release.yml. Requires npm >= 11.5.1 (bundled with Node 24) and provenance is
# generated automatically.
permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      # Trusted publishing (OIDC) needs npm >= 11.5.1; the runner's bundled npm
      # is older, so upgrade before publishing. We deliberately do not set
      # setup-node's registry-url: it writes an .npmrc placeholder authToken
      # that npm would use instead of performing the OIDC exchange.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run check
      - run: npm publish --provenance --access public
